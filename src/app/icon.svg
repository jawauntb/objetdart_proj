<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- ring flame -->
  <circle cx="16" cy="8.5" r="3.6" fill="none" stroke="#C8732A" stroke-width="1.6"/>
  <!-- wick (faint) -->
  <line x1="16" x2="16" y1="12.1" y2="13.4" stroke="#C8732A" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <!-- candle body -->
  <line x1="16" x2="16" y1="13.4" y2="28" stroke="#E8E1D2" stroke-width="2.2" stroke-linecap="round"/>
  <!-- inner shadow on the body for subtle dimension -->
  <line x1="16" x2="16" y1="14" y2="27.4" stroke="#15171A" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
</svg>
