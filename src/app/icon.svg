<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="gold" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#fff6da"/>
      <stop offset="42%" stop-color="#e7b94e"/>
      <stop offset="100%" stop-color="#8a6410"/>
    </radialGradient>
  </defs>
  <!-- outer milled rim -->
  <circle cx="16" cy="16" r="15" fill="url(#gold)" stroke="#6b4d0d" stroke-width="0.8"/>
  <!-- beaded rim ring -->
  <g fill="#6b4d0d" opacity="0.85">
    <!-- 24 beads around r=13 -->
    <circle cx="16" cy="3" r="0.7"/>
    <circle cx="19.4" cy="3.45" r="0.7"/>
    <circle cx="22.5" cy="4.75" r="0.7"/>
    <circle cx="25.2" cy="6.8" r="0.7"/>
    <circle cx="27.25" cy="9.5" r="0.7"/>
    <circle cx="28.55" cy="12.6" r="0.7"/>
    <circle cx="29" cy="16" r="0.7"/>
    <circle cx="28.55" cy="19.4" r="0.7"/>
    <circle cx="27.25" cy="22.5" r="0.7"/>
    <circle cx="25.2" cy="25.2" r="0.7"/>
    <circle cx="22.5" cy="27.25" r="0.7"/>
    <circle cx="19.4" cy="28.55" r="0.7"/>
    <circle cx="16" cy="29" r="0.7"/>
    <circle cx="12.6" cy="28.55" r="0.7"/>
    <circle cx="9.5" cy="27.25" r="0.7"/>
    <circle cx="6.8" cy="25.2" r="0.7"/>
    <circle cx="4.75" cy="22.5" r="0.7"/>
    <circle cx="3.45" cy="19.4" r="0.7"/>
    <circle cx="3" cy="16" r="0.7"/>
    <circle cx="3.45" cy="12.6" r="0.7"/>
    <circle cx="4.75" cy="9.5" r="0.7"/>
    <circle cx="6.8" cy="6.8" r="0.7"/>
    <circle cx="9.5" cy="4.75" r="0.7"/>
    <circle cx="12.6" cy="3.45" r="0.7"/>
  </g>
  <!-- inner field ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#6b4d0d" stroke-width="0.7" opacity="0.6"/>
  <!-- bold cross -->
  <g fill="#5c420b">
    <rect x="14.7" y="6.5" width="2.6" height="19" rx="0.5"/>
    <rect x="6.5" y="14.7" width="19" height="2.6" rx="0.5"/>
  </g>
  <!-- cross highlight -->
  <g fill="#fff6da" opacity="0.5">
    <rect x="15.1" y="6.9" width="0.9" height="18.2" rx="0.4"/>
    <rect x="6.9" y="15.1" width="18.2" height="0.9" rx="0.4"/>
  </g>
  <!-- specular highlight -->
  <ellipse cx="11" cy="10" rx="4.5" ry="3" fill="#ffffff" opacity="0.25"/>
